<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="강안교육">
<title>강안교육 근태관리</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f5f6f8;--surface:#fff;--border:#e8eaed;--border-light:#f0f1f3;
  --text-primary:#1a1d23;--text-secondary:#6b7280;--text-muted:#9ca3af;
  --accent:#2563eb;--accent-light:#eff6ff;--accent-hover:#1d4ed8;
  --success:#16a34a;--success-light:#f0fdf4;
  --warning:#d97706;--warning-light:#fffbeb;
  --danger:#dc2626;--danger-light:#fef2f2;
  --orange:#ea580c;--orange-light:#fff7ed;
  --shadow-sm:0 1px 3px rgba(0,0,0,.06);--shadow:0 4px 12px rgba(0,0,0,.08);--shadow-lg:0 10px 30px rgba(0,0,0,.12);
  --r:10px;--rs:6px;--rl:14px;
  --c-국어:#e11d48;--c-수학:#3b82f6;--c-영어:#ec4899;--c-지리:#f59e0b;
  --c-물리:#f97316;--c-화학:#14b8a6;--c-생명:#16a34a;--c-지학:#8b5cf6;
  --c-사문:#0ea5e9;--c-생윤:#6366f1;
  --c-순찰:#0ea5e9;--c-1층:#8b5cf6;--c-식관:#f59e0b;--c-응대:#10b981;
  --c-스타터:#6366f1;--c-디자인:#e11d48;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text-primary);min-height:100vh;}

/* LOGIN */
#login-screen{position:fixed;inset:0;background:linear-gradient(135deg,#1e293b,#0f172a 50%,#1e3a5f);display:flex;align-items:center;justify-content:center;z-index:1000;transition:opacity .4s;}
#login-screen.hide{opacity:0;pointer-events:none;}
.lc{background:rgba(255,255,255,.05);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.1);border-radius:20px;padding:48px 40px;width:380px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.4);}
.lc-logo{width:52px;height:52px;background:var(--accent);border-radius:14px;display:flex;align-items:center;justify-content:center;margin:0 auto 20px;font-size:24px;}
.lc-title{font-size:22px;font-weight:700;color:#fff;margin-bottom:4px;}
.lc-sub{font-size:13px;color:rgba(255,255,255,.45);margin-bottom:36px;}
.lf{margin-bottom:14px;text-align:left;}
.lf label{font-size:12px;font-weight:500;color:rgba(255,255,255,.5);display:block;margin-bottom:6px;letter-spacing:.5px;text-transform:uppercase;}
.lf input{width:100%;padding:12px 16px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);border-radius:var(--rs);color:#fff;font-size:15px;font-family:inherit;outline:none;transition:border-color .2s;}
.lf input:focus{border-color:rgba(99,160,255,.6);background:rgba(255,255,255,.1);}
.lf input::placeholder{color:rgba(255,255,255,.25);}
.l-err{font-size:12px;color:#f87171;margin-bottom:12px;min-height:16px;}
.l-btn{width:100%;padding:13px;background:var(--accent);color:#fff;border:none;border-radius:var(--rs);font-size:15px;font-weight:600;font-family:inherit;cursor:pointer;margin-top:4px;transition:background .2s;}
.l-btn:hover{background:var(--accent-hover);}

/* APP */
#app{display:none;min-height:100vh;flex-direction:column;}
#app.show{display:flex;}

/* TOPNAV */
.topnav{height:56px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:10px;position:sticky;top:0;z-index:100;box-shadow:var(--shadow-sm);}
.topnav-logo{font-size:16px;font-weight:700;}
.topnav-logo span{color:var(--accent);}
.topnav-spacer{flex:1;}
.topnav-date{font-size:12px;color:var(--text-muted);font-family:'DM Mono',monospace;}
.ubadge{padding:4px 10px;border-radius:20px;font-size:12px;font-weight:500;background:var(--accent-light);color:var(--accent);}
.ubadge.총무{background:#fef3c7;color:#92400e;}
.ubadge.일반직원{background:#f3f4f6;color:#374151;}
.logout-btn{padding:5px 12px;border-radius:var(--rs);font-size:12px;font-weight:500;background:none;border:1px solid var(--border);color:var(--text-secondary);cursor:pointer;font-family:inherit;transition:all .15s;}
.logout-btn:hover{background:var(--danger-light);border-color:var(--danger);color:var(--danger);}

/* TABNAV */
.tabnav{background:var(--surface);border-bottom:1px solid var(--border);display:flex;overflow-x:auto;padding:0 16px;scrollbar-width:none;}
.tabnav::-webkit-scrollbar{display:none;}
.tab-btn{display:flex;align-items:center;gap:6px;padding:0 14px;height:46px;font-size:13px;font-weight:500;color:var(--text-secondary);white-space:nowrap;border:none;background:none;cursor:pointer;font-family:inherit;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s;}
.tab-btn:hover{color:var(--text-primary);}
.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:600;}

/* MAIN */
.main{padding:20px;max-width:1400px;margin:0 auto;width:100%;}
.tab-content{display:none;}
.tab-content.active{display:block;}

/* STATS */
.stats-row{display:flex;gap:10px;margin-bottom:18px;flex-wrap:wrap;}
.stat-card{flex:1;min-width:100px;background:var(--surface);border-radius:var(--r);padding:14px 16px;border:1px solid var(--border);cursor:pointer;transition:box-shadow .15s,transform .1s;}
.stat-card:hover{box-shadow:var(--shadow);transform:translateY(-1px);}
.stat-label{font-size:11px;font-weight:500;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;}
.stat-val{font-size:26px;font-weight:700;font-family:'DM Mono',monospace;}
.stat-card.danger .stat-val{color:var(--danger);}
.stat-card.warning .stat-val{color:var(--warning);}
.stat-card.orange .stat-val{color:var(--orange);}
.stat-card.success .stat-val{color:var(--success);}
.stat-dot{width:6px;height:6px;border-radius:50%;display:inline-block;margin-left:6px;animation:pulse 1.5s infinite;background:var(--danger);}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* SECTION */
.section-card{background:var(--surface);border-radius:var(--rl);border:1px solid var(--border);padding:20px;margin-bottom:16px;box-shadow:var(--shadow-sm);}
.timeline-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.timeline-title{font-size:14px;font-weight:600;color:var(--text-secondary);}
.timeline-time{font-size:12px;font-family:'DM Mono',monospace;color:var(--text-muted);}

/* AXIS */
.tl-axis-row{display:flex;align-items:center;gap:12px;padding:0 14px;margin-bottom:6px;}
.tl-axis-info-col{width:160px;flex-shrink:0;}
.tl-axis-bar-col{flex:1;position:relative;height:20px;}
.tl-axis-marks{position:absolute;inset:0;pointer-events:none;}
.tl-axis-mark{position:absolute;bottom:0;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:2px;}
.tl-axis-mark span{font-size:10px;font-family:'DM Mono',monospace;color:var(--text-muted);white-space:nowrap;}
.tl-axis-mark-line{width:1px;height:5px;background:var(--border);}
.tl-axis-badge-col{width:64px;flex-shrink:0;}

/* TIMELINE */
.timeline-list{display:flex;flex-direction:column;gap:6px;}
.tl-item{background:var(--surface);border-radius:var(--r);border:1px solid var(--border);padding:0 14px;height:62px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:box-shadow .15s,border-color .15s;overflow:hidden;}
.tl-item:hover{box-shadow:var(--shadow);border-color:#d1d5db;}
.tl-item.status-absent{border-color:#fca5a5;background:#fff5f5;}
.tl-item.status-late{border-left:3px solid var(--warning);}
.tl-item.status-changed{border-left:3px solid var(--orange);}
.tl-item.status-done{border-left:3px solid var(--success);}
.tl-colorbar{width:4px;height:32px;border-radius:2px;flex-shrink:0;}
.tl-info{width:148px;flex-shrink:0;}
.tl-name-row{display:flex;align-items:baseline;gap:6px;}
.tl-role{font-size:13px;font-weight:700;}
.tl-name{font-size:11px;color:var(--text-muted);}
.tl-time-row{font-size:11px;color:var(--text-secondary);margin-top:2px;font-family:'DM Mono',monospace;}
.tl-bar-area{flex:1;position:relative;height:26px;min-width:0;}
.tl-bar-bg{position:absolute;inset:4px 0;background:var(--border-light);border-radius:4px;}
.tl-bar-fill{position:absolute;top:4px;bottom:4px;border-radius:4px;}
.tl-now-line{position:absolute;top:0;bottom:0;width:2px;background:rgba(220,38,38,.35);border-radius:1px;pointer-events:none;}
.tl-status-badge{padding:3px 8px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap;flex-shrink:0;width:64px;text-align:center;}
.badge-pending{background:#f3f4f6;color:var(--text-muted);}
.badge-done{background:var(--success-light);color:var(--success);}
.badge-absent{background:var(--danger-light);color:var(--danger);}
.badge-late{background:var(--warning-light);color:var(--warning);}
.badge-changed{background:var(--orange-light);color:var(--orange);}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:500;display:none;align-items:center;justify-content:center;padding:20px;}
.modal-overlay.open{display:flex;}
.modal{background:var(--surface);border-radius:var(--rl);padding:28px;width:100%;max-width:480px;box-shadow:var(--shadow-lg);animation:slideUp .2s ease;max-height:90vh;overflow-y:auto;}
.modal.wide{max-width:700px;}
@keyframes slideUp{from{transform:translateY(12px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;}
.modal-title{font-size:17px;font-weight:700;}
.modal-close{width:28px;height:28px;border-radius:6px;border:none;background:var(--border-light);cursor:pointer;font-size:16px;color:var(--text-secondary);display:flex;align-items:center;justify-content:center;}
.modal-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border-light);}
.modal-key{font-size:12px;color:var(--text-muted);font-weight:500;}
.modal-val{font-size:13px;font-weight:600;}
.phone-link{color:var(--accent);text-decoration:none;font-family:'DM Mono',monospace;}

/* MEMO */
.memo-list{margin-top:10px;display:flex;flex-direction:column;gap:6px;max-height:160px;overflow-y:auto;}
.memo-item{background:var(--bg);border-radius:var(--rs);padding:8px 10px;font-size:12px;border-left:3px solid var(--border);}
.memo-tag{display:inline-block;padding:1px 7px;border-radius:10px;font-size:10px;font-weight:700;margin-right:5px;}
.memo-meta{font-size:11px;color:var(--text-muted);margin-bottom:3px;display:flex;gap:6px;align-items:center;flex-wrap:wrap;}
.memo-who{font-weight:600;color:var(--text-secondary);}
.memo-text{color:var(--text-primary);font-size:12px;margin-top:2px;}
.std-phrase-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px;}
.std-btn{padding:5px 10px;border-radius:20px;font-size:11px;font-weight:600;border:1.5px solid var(--border);background:var(--bg);color:var(--text-muted);cursor:pointer;font-family:inherit;transition:all .15s;}
.std-btn.selected{background:var(--accent);border-color:var(--accent);color:#fff;}
.memo-area{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:var(--rs);font-family:inherit;font-size:13px;resize:vertical;min-height:60px;outline:none;margin-top:6px;transition:border-color .2s;}
.memo-area:focus{border-color:var(--accent);}
.memo-area.error{border-color:var(--danger);}

/* BUTTONS */
.btn-row{display:flex;justify-content:flex-end;gap:8px;margin-top:14px;}
.btn-primary{padding:9px 18px;background:var(--accent);color:#fff;border:none;border-radius:var(--rs);font-size:13px;font-weight:600;font-family:inherit;cursor:pointer;transition:background .15s;}
.btn-primary:hover{background:var(--accent-hover);}
.btn-secondary{padding:9px 18px;background:var(--bg);color:var(--text-secondary);border:1px solid var(--border);border-radius:var(--rs);font-size:13px;font-weight:500;font-family:inherit;cursor:pointer;}
.btn-danger{padding:9px 18px;background:var(--danger-light);color:var(--danger);border:1px solid #fca5a5;border-radius:var(--rs);font-size:13px;font-weight:600;font-family:inherit;cursor:pointer;}

/* FORM */
.form-group{margin-bottom:14px;}
.form-label{font-size:12px;font-weight:600;color:var(--text-secondary);display:block;margin-bottom:6px;}
.form-input{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:var(--rs);font-family:inherit;font-size:14px;outline:none;transition:border-color .2s;background:var(--surface);}
.form-input:focus{border-color:var(--accent);}
.form-input.error{border-color:var(--danger);}
.form-select{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:var(--rs);font-family:inherit;font-size:14px;outline:none;background:var(--surface);cursor:pointer;}
.day-btns{display:flex;gap:6px;flex-wrap:wrap;}
.day-btn{padding:6px 10px;border-radius:var(--rs);font-size:12px;font-weight:600;border:1.5px solid var(--border);background:var(--bg);color:var(--text-secondary);cursor:pointer;font-family:inherit;transition:all .15s;}
.day-btn.selected{background:var(--accent);border-color:var(--accent);color:#fff;}

/* PARTS TABLE */
.parts-table{width:100%;border-collapse:collapse;}
.parts-table th{font-size:11px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;padding:8px 12px;border-bottom:2px solid var(--border);text-align:left;white-space:nowrap;}
.parts-table td{padding:10px 12px;border-bottom:1px solid var(--border-light);font-size:13px;vertical-align:middle;}
.parts-table tr:hover td{background:var(--bg);}
.sbadge{padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600;}
.s-active{background:var(--success-light);color:var(--success);}
.s-inactive{background:#f3f4f6;color:var(--text-muted);}
.icon-btn{padding:4px 10px;border-radius:var(--rs);font-size:11px;font-weight:500;border:1px solid var(--border);background:var(--bg);color:var(--text-secondary);cursor:pointer;font-family:inherit;transition:all .15s;margin:2px;}
.icon-btn:hover{background:var(--accent-light);border-color:var(--accent);color:var(--accent);}

/* STATS POPUP */
.sp-list{display:flex;flex-direction:column;gap:6px;margin-top:4px;}
.sp-item{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;background:var(--bg);border-radius:var(--rs);border:1px solid var(--border-light);cursor:pointer;}
.undot{width:7px;height:7px;border-radius:50%;background:var(--danger);display:inline-block;margin-left:4px;animation:pulse 1.5s infinite;}

/* 회계 확인 */
.acct-filters{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;align-items:flex-end;}
.acct-table{width:100%;border-collapse:collapse;font-size:12px;}
.acct-table th{font-size:11px;font-weight:600;color:var(--text-muted);text-transform:uppercase;padding:8px 10px;border-bottom:2px solid var(--border);text-align:left;white-space:nowrap;background:var(--bg);}
.acct-table td{padding:8px 10px;border-bottom:1px solid var(--border-light);vertical-align:middle;}
.acct-table tr:hover td{background:var(--bg);}
.diff-badge{padding:1px 6px;border-radius:10px;font-size:10px;font-weight:700;}
.diff-plus{background:var(--orange-light);color:var(--orange);}
.diff-minus{background:var(--danger-light);color:var(--danger);}

/* 설정 */
.settings-section{margin-bottom:24px;}
.settings-title{font-size:15px;font-weight:700;margin-bottom:12px;padding-bottom:8px;border-bottom:2px solid var(--border);}
.account-list{display:flex;flex-direction:column;gap:8px;}
.account-item{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:var(--bg);border-radius:var(--r);border:1px solid var(--border);}

/* PLACEHOLDER */
.placeholder-box{background:var(--surface);border-radius:var(--rl);border:2px dashed var(--border);padding:60px 20px;text-align:center;color:var(--text-muted);}
.ph-icon{font-size:40px;margin-bottom:12px;}
.ph-title{font-size:16px;font-weight:600;color:var(--text-secondary);margin-bottom:6px;}

/* LOADING/TOAST */
.loading-bar{position:fixed;top:0;left:0;right:0;height:3px;background:var(--accent);z-index:9999;display:none;}
.loading-bar.show{display:block;animation:lb 1s ease-in-out infinite;}
@keyframes lb{0%{width:0}50%{width:70%}100%{width:100%}}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1a1d23;color:#fff;padding:10px 20px;border-radius:var(--r);font-size:13px;font-weight:500;z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;}
.toast.show{opacity:1;}

@media(max-width:640px){.main{padding:12px;}.lc{width:92%;padding:32px 20px;}.tl-bar-area{min-width:60px;}}
</style>
</head>
<body>
<div class="loading-bar" id="loading-bar"></div>
<div class="toast" id="toast"></div>

<!-- LOGIN -->
<div id="login-screen">
  <div class="lc">
    <div class="lc-logo">🏫</div>
    <div class="lc-title">강안교육</div>
    <div class="lc-sub">근태관리 시스템</div>
    <div class="lf"><label>아이디</label><input type="text" id="login-id" placeholder="ID 입력" autocomplete="username"></div>
    <div class="lf"><label>비밀번호</label><input type="password" id="login-pw" placeholder="비밀번호 입력"></div>
    <div class="l-err" id="login-error"></div>
    <button class="l-btn" onclick="doLogin()">로그인</button>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="topnav">
    <div class="topnav-logo">강안<span>교육</span></div>
    <div class="topnav-spacer"></div>
    <div class="topnav-date" id="top-date"></div>
    <span class="ubadge" id="user-badge"></span>
    <span id="user-name-label" style="font-size:13px;font-weight:500;color:var(--text-secondary)"></span>
    <button class="logout-btn" onclick="doLogout()">로그아웃</button>
  </div>
  <div class="tabnav" id="tabnav"></div>
  <div class="main">

    <!-- 관리 파트 -->
    <div class="tab-content active" id="tab-mgmt">
      <div class="stats-row" id="stats-mgmt"></div>
      <div class="section-card">
        <div class="timeline-header"><div class="timeline-title">오늘 근무 현황</div><div class="timeline-time" id="tl-time-mgmt"></div></div>
        <div class="timeline-list" id="tl-mgmt"><div style="padding:20px;text-align:center;color:var(--text-muted)">불러오는 중...</div></div>
      </div>
    </div>

    <!-- 조교 -->
    <div class="tab-content" id="tab-tutor">
      <div class="stats-row" id="stats-tutor"></div>
      <div class="section-card">
        <div class="timeline-header"><div class="timeline-title">오늘 근무 현황</div><div class="timeline-time" id="tl-time-tutor"></div></div>
        <div class="timeline-list" id="tl-tutor"><div style="padding:20px;text-align:center;color:var(--text-muted)">불러오는 중...</div></div>
      </div>
    </div>

    <!-- 기타 -->
    <div class="tab-content" id="tab-etc">
      <div class="stats-row" id="stats-etc"></div>
      <div class="section-card">
        <div class="timeline-header"><div class="timeline-title">오늘 근무 현황</div><div class="timeline-time" id="tl-time-etc"></div></div>
        <div class="timeline-list" id="tl-etc"><div style="padding:20px;text-align:center;color:var(--text-muted)">불러오는 중...</div></div>
      </div>
    </div>

    <!-- 근무 관리 -->
    <div class="tab-content" id="tab-workman">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
        <div style="font-size:16px;font-weight:700">근무 관리</div>
      </div>
      <div class="section-card">
        <div style="margin-bottom:12px">
          <div style="font-size:13px;font-weight:600;color:var(--text-secondary);margin-bottom:10px">날짜 선택</div>
          <input type="date" id="workman-date" class="form-input" style="max-width:200px" onchange="loadWorkmanData()">
        </div>
        <div id="workman-list"><div style="padding:20px;text-align:center;color:var(--text-muted);font-size:13px">날짜를 선택하세요</div></div>
      </div>
    </div>

    <!-- 출퇴근 기록 -->
    <div class="tab-content" id="tab-records">
      <div class="section-card">

// ── CONSTANTS ──
const STD_PHRASES = ['지각-차감','지각-차감안함','단축-본인요청','단축-직원지시','추가-직원지시','결근-병가','결근-개인사정','결근-무단','수정-패드오류'];

const SUB_COLORS = {
  순찰:'#0ea5e9','1층':'#8b5cf6',식관:'#f59e0b',응대:'#10b981',
  국어:'#e11d48',수학:'#3b82f6',영어:'#ec4899',지리:'#f59e0b',
  물리:'#f97316',화학:'#14b8a6',생명:'#16a34a',지학:'#8b5cf6',
  사문:'#0ea5e9',생윤:'#6366f1',
  스타터:'#6366f1',디자인:'#e11d48'
};

const CAT_META = {

const ALL_TABS = [
  {key:'mgmt',label:'관리 파트',icon:'📊',roles:['관리자','총무','일반직원']},
  {key:'tutor',label:'조교',icon:'🎓',roles:['관리자','총무','일반직원']},
  {key:'etc',label:'기타 파트',icon:'🏢',roles:['관리자','총무','일반직원']},
  {key:'workman',label:'근무 관리',icon:'📋',roles:['관리자']},
  {key:'records',label:'출퇴근 기록',icon:'🕐',roles:['관리자','총무']},
  {key:'parts',label:'파트 관리',icon:'👥',roles:['관리자']},
  {key:'acct',label:'시수 확인',icon:'📊',roles:['관리자','총무']},

];

// ── STATE ──
let currentUser = null, activeTab = 'mgmt';
let allParts = {}, todayAttend = {}, allAccounts = [];
let _stdPhrase = {}, acctData = [];

// ── UTILS ──
const todayStr = () => { const d=new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; };
const nowStr   = () => { const d=new Date(); return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`; };
const dateLabel= () => { const d=new Date(); return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`; };
const toMins   = s => { if(!s) return 0; const [h,m]=s.split(':').map(Number); return h*60+m; };
const minsToHM = m => `${String(Math.floor(m/60)).padStart(2,'0')}:${String(m%60).padStart(2,'0')}`;
const colorOf  = r => SUB_COLORS[r] || '#6b7280';
const showLoading = v => document.getElementById('loading-bar').classList.toggle('show',v);
const showToast = msg => { const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2500); };
const openModal  = id => document.getElementById(id).classList.add('open');
const closeModal = id => document.getElementById(id).classList.remove('open');

// 시수 소수점 계산
function calcHours(startHM, endHM) {
  const mins = toMins(endHM) - toMins(startHM);
  return Math.round(mins/60*10)/10;
}

// 최종 시수 계산
function calcFinalHours(part, attRecord) {
  const schedHours = calcHours(part.start, part.end);
  if (!attRecord) return schedHours;
  const phrase = attRecord.stdPhrase || '';
  if (phrase.startsWith('단축')) return calcHours(part.start, attRecord.adjustedEnd || part.end);
  if (phrase.startsWith('추가')) return calcHours(part.start, attRecord.adjustedEnd || part.end);
  if (phrase === '결근-병가' || phrase === '결근-개인사정' || phrase === '결근-무단') return 0;
  if (phrase === '지각-차감안함') return schedHours;
  if (phrase === '지각-차감' && attRecord.inTime) return calcHours(attRecord.inTime, part.end);
  // 지각이지만 phrase 없음 → 패드기준 차감
  if (attRecord.inTime && toMins(attRecord.inTime) > toMins(part.start) + 10) {
    return calcHours(attRecord.inTime, part.end);
  }
  return schedHours;
}

// ── LOGIN ──
async function doLogin() {
  const id = document.getElementById('login-id').value.trim();
  const pw = document.getElementById('login-pw').value;
  // 초기 계정 체크
  const initAccounts = [{id:'admin',pw:'0000',role:'관리자',name:'관리자'}];
  // Firebase 계정 로드
  showLoading(true);
  const snap = await get(ref(db,'accounts'));
  showLoading(false);
  const fbAccounts = snap.val() ? Object.values(snap.val()) : [];
  const accounts = [...initAccounts, ...fbAccounts];
  const acc = accounts.find(a => a.id===id && a.pw===pw);
  if (!acc) { document.getElementById('login-error').textContent='아이디 또는 비밀번호가 올바르지 않습니다.'; return; }
  currentUser = acc;
  document.getElementById('login-error').textContent='';
  document.getElementById('login-screen').classList.add('hide');
  setTimeout(()=>{ document.getElementById('login-screen').style.display='none'; document.getElementById('app').classList.add('show'); initApp(); },400);
}
function doLogout() {
  currentUser = null;
  document.getElementById('app').classList.remove('show');
  document.getElementById('login-screen').style.display='flex';
  requestAnimationFrame(()=>document.getElementById('login-screen').classList.remove('hide'));
  document.getElementById('login-pw').value='';
}
document.getElementById('login-pw').addEventListener('keydown',e=>{ if(e.key==='Enter') doLogin(); });
document.getElementById('login-id').addEventListener('keydown',e=>{ if(e.key==='Enter') document.getElementById('login-pw').focus(); });
window.doLogin=doLogin; window.doLogout=doLogout;

// ── INIT ──
function initApp() {
  document.getElementById('user-badge').textContent = currentUser.role;
  document.getElementById('user-badge').className = 'ubadge '+currentUser.role;
  document.getElementById('user-name-label').textContent = currentUser.name;
  // 날짜 기본값
  const today = todayStr();

  const rf = document.getElementById('rec-from'); if(rf) rf.value=today;
  const rt = document.getElementById('rec-to');   if(rt) rt.value=today;

}

function updateClock() {
  const d=new Date(), days=['일','월','화','수','목','금','토'];
  document.getElementById('top-date').textContent=`${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')} (${days[d.getDay()]})  ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}

// ── FIREBASE ──
function listenParts() {
  onValue(ref(db,'parts'), snap => { allParts=snap.val()||{}; renderAll(); renderPartsTable(); });
}
function listenAttendance() {
  onValue(ref(db,`attendance/${todayStr()}`), snap => { todayAttend=snap.val()||{}; renderAll(); });
}
async function loadAccounts() {
  const snap = await get(ref(db,'accounts'));
  allAccounts = snap.val() ? Object.entries(snap.val()).map(([id,v])=>({fbId:id,...v})) : [];

// ── TABS ──
function buildTabs() {
  const nav=document.getElementById('tabnav'); nav.innerHTML='';
  ALL_TABS.filter(t=>t.roles.includes(currentUser.role)).forEach(t=>{
    const btn=document.createElement('button');

    btn.onclick=()=>switchTab(t.key);
    nav.appendChild(btn);

}
function switchTab(key) {
  activeTab=key;
  document.querySelectorAll('.tab-content').forEach(el=>el.classList.remove('active'));
  document.getElementById('tab-'+key)?.classList.add('active');
  const tabs=ALL_TABS.filter(t=>t.roles.includes(currentUser.role));

}
window.switchTab=switchTab;

// ── RENDER DASHBOARD ──
function partsForCat(cat) {
  return Object.entries(allParts).filter(([,p])=>p.cat===cat&&p.active!==false).map(([id,p])=>({...p,id}));
}
function enrichWithAttendance(parts) {
  const dayMap=['일','월','화','수','목','금','토'];
  const todayDay=dayMap[new Date().getDay()];
  const nowMins=new Date().getHours()*60+new Date().getMinutes();
  return parts.map(p=>{
    if(!(p.days||[]).includes(todayDay)) return null;
    const att=todayAttend[p.id]||{};
    let status='pending', actual=att.inTime||null;
    if(att.inTime) status=toMins(att.inTime)>toMins(p.start)+10?'late':'done';
    else if(nowMins>toMins(p.start)+10) status='absent';
    if(att.stdPhrase&&(att.stdPhrase.startsWith('단축')||att.stdPhrase.startsWith('추가'))) status='changed';
    return {...p,actual,status,attRecord:att};
  }).filter(Boolean);
}
function renderAll() {
  ['mgmt','tutor','etc'].forEach(cat=>{
    const parts=enrichWithAttendance(partsForCat(cat));
    renderStats(cat,parts); renderTimeline(cat,parts);
  });
}
function renderStats(cat,parts) {
  const cnt=s=>parts.filter(p=>p.status===s).length;
  const absent=cnt('absent');
  document.getElementById('stats-'+cat).innerHTML=`
    <div class="stat-card success" onclick="openStatsModal('${cat}','done')"><div class="stat-label">출근완료</div><div class="stat-val">${cnt('done')}</div></div>
    <div class="stat-card" onclick="openStatsModal('${cat}','pending')"><div class="stat-label">출근 전</div><div class="stat-val">${cnt('pending')}</div></div>
    <div class="stat-card danger" onclick="openStatsModal('${cat}','absent')"><div class="stat-label">결근·미출근${absent>0?'<span class="stat-dot"></span>':''}</div><div class="stat-val">${absent}</div></div>
    <div class="stat-card warning" onclick="openStatsModal('${cat}','late')"><div class="stat-label">지각</div><div class="stat-val">${cnt('late')}</div></div>
    <div class="stat-card orange" onclick="openStatsModal('${cat}','changed')"><div class="stat-label">변경근무</div><div class="stat-val">${cnt('changed')}</div></div>
    <div class="stat-card" style="cursor:default"><div class="stat-label">전체</div><div class="stat-val">${parts.length}</div></div>`;
}
function renderTimeline(cat,parts) {
  const container=document.getElementById('tl-'+cat);
  document.getElementById('tl-time-'+cat).textContent=`기준 ${nowStr()}`;
  if(!parts.length){container.innerHTML='<div style="padding:20px;text-align:center;color:var(--text-muted);font-size:13px">오늘 근무 인원 없음</div>';return;}
  const allS=parts.map(p=>toMins(p.start)), allE=parts.map(p=>toMins(p.end));
  let axisMin=Math.floor(Math.min(...allS)/30)*30, axisMax=Math.ceil(Math.max(...allE)/30)*30;
  if(axisMax-axisMin<120) axisMax=axisMin+120;
  const axisSpan=axisMax-axisMin;
  const nowMins=new Date().getHours()*60+new Date().getMinutes();
  const nowPct=Math.max(0,Math.min(100,(nowMins-axisMin)/axisSpan*100));
  const tickStep=axisSpan<=240?60:axisSpan<=480?120:180;
  const ticks=[];
  for(let t=Math.ceil(axisMin/tickStep)*tickStep;t<=axisMax;t+=tickStep) ticks.push(t);
  const axisHtml=`<div class="tl-axis-row">
    <div class="tl-colorbar" style="visibility:hidden"></div>
    <div class="tl-axis-info-col"></div>
    <div class="tl-axis-bar-col"><div class="tl-axis-marks">
      ${ticks.map(t=>`<div class="tl-axis-mark" style="left:${(t-axisMin)/axisSpan*100}%"><span>${minsToHM(t)}</span><div class="tl-axis-mark-line"></div></div>`).join('')}
      ${nowMins>=axisMin&&nowMins<=axisMax?`<div style="position:absolute;top:0;bottom:0;left:${nowPct}%;width:2px;background:rgba(220,38,38,.5);border-radius:1px"></div>`:''}
    </div></div>
    <div class="tl-axis-badge-col"></div></div>`;
  const sorted=[...parts].sort((a,b)=>{
    const o={done:0,late:0,changed:0,absent:1,pending:2};
    return o[a.status]!==o[b.status]?o[a.status]-o[b.status]:a.start.localeCompare(b.start);
  });
  container.innerHTML=axisHtml+sorted.map(emp=>buildTlItem(emp,axisMin,axisSpan,nowPct)).join('');
}
function buildTlItem(emp,axisMin,axisSpan,nowPct) {
  const sc={done:'status-done',absent:'status-absent',late:'status-late',changed:'status-changed',pending:''}[emp.status]||'';
  const badge={done:'<span class="tl-status-badge badge-done">출근완료</span>',absent:'<span class="tl-status-badge badge-absent">⚠ 미출근</span>',late:'<span class="tl-status-badge badge-late">지각</span>',changed:'<span class="tl-status-badge badge-changed">변경근무</span>',pending:'<span class="tl-status-badge badge-pending">대기</span>'}[emp.status];
  const sM=toMins(emp.start), eM=toMins(emp.end);
  const bl=Math.max(0,(sM-axisMin)/axisSpan*100);
  const bw=Math.min(100,(eM-axisMin)/axisSpan*100)-bl;
  const bc={absent:'var(--danger)',late:'var(--warning)',changed:'var(--orange)',done:'var(--success)',pending:'#cbd5e1'}[emp.status];
  const color=colorOf(emp.role);
  const timeStr=emp.actual?`<span style="color:var(--success);font-weight:600">${emp.actual}</span> → ${emp.end}`:`${emp.start} ~ ${emp.end}`;
  return `<div class="tl-item ${sc}" onclick="openStaffModal('${emp.id}')">
    <div class="tl-colorbar" style="background:${color}"></div>
    <div class="tl-info"><div class="tl-name-row"><span class="tl-role" style="color:${color}">${emp.role}</span><span class="tl-name">(${emp.name})</span></div><div class="tl-time-row">${timeStr}</div></div>
    <div class="tl-bar-area"><div class="tl-bar-bg"></div><div class="tl-bar-fill" style="left:${bl}%;width:${bw}%;background:${bc};opacity:${emp.status==='pending'?.35:1}"></div><div class="tl-now-line" style="left:${nowPct}%"></div></div>
    ${badge}</div>`;
}

// ── STAFF MODAL ──
function openStaffModal(partId) {
  const p=allParts[partId]; if(!p) return;
  const color=colorOf(p.role);
  const att=todayAttend[partId]||{};
  const nowMins=new Date().getHours()*60+new Date().getMinutes();
  let status='pending';
  if(att.inTime) status=toMins(att.inTime)>toMins(p.start)+10?'late':'done';
  else if(nowMins>toMins(p.start)+10) status='absent';
  const statusLabel={done:'출근완료',absent:'⚠ 미출근',late:'지각',changed:'변경근무',pending:'출근 전'}[status];
  const statusColor={done:'var(--success)',absent:'var(--danger)',late:'var(--warning)',changed:'var(--orange)',pending:'var(--text-muted)'}[status];
  const schedH=calcHours(p.start,p.end);
  const finalH=calcFinalHours(p,att.inTime?att:null);
  const canMemo=currentUser.role==='관리자';

  document.getElementById('modal-staff-title').innerHTML=`<span style="color:${color};font-weight:700">${p.role}</span> <span style="font-size:14px;color:var(--text-secondary)">(${p.name})</span>`;

  showLoading(false);
  const attData=snap.val()||{};
  const parts=Object.entries(allParts).filter(([,p])=>p.active!==false).map(([id,p])=>({...p,id}));
  const dayMap=['일','월','화','수','목','금','토'];

      <td>${att.stdPhrase?`<span class="sbadge s-active">${att.stdPhrase}</span>`:'<span style="color:var(--text-muted);font-size:12px">-</span>'}</td>
      <td>${canEdit?`<button class="icon-btn" onclick="openWorkmanEdit('${p.id}','${date}')">수정</button>`:''}

async function loadRecords() {
  const from=document.getElementById('rec-from').value;
  const to=document.getElementById('rec-to').value;
  if(!from||!to){ showToast('기간을 선택해주세요'); return; }
  showLoading(true);
  const parts=Object.entries(allParts).map(([id,p])=>({...p,id}));
  const rows=[];
  let cur=new Date(from);
  const end=new Date(to);
  while(cur<=end){
    const dateKey=`${cur.getFullYear()}-${String(cur.getMonth()+1).padStart(2,'0')}-${String(cur.getDate()).padStart(2,'0')}`;
    const snap=await get(ref(db,`attendance/${dateKey}`));
    const attData=snap.val()||{};
    const dayMap=['일','월','화','수','목','금','토'];
    const dayOfWeek=dayMap[cur.getDay()];
    parts.filter(p=>(p.days||[]).includes(dayOfWeek)&&p.active!==false).forEach(p=>{
      const att=attData[p.id]||{};
      rows.push({date:dateKey,part:p,att});
    });
    cur.setDate(cur.getDate()+1);
  }
  showLoading(false);
  if(!rows.length){document.getElementById('records-body').innerHTML='<div style="padding:20px;text-align:center;color:var(--text-muted)">해당 기간 기록 없음</div>';return;}
  const tableRows=rows.map(r=>{
    const color=colorOf(r.part.role);
    return`<tr>
      <td>${r.date}</td>
      <td><span style="color:${color};font-weight:700">${r.part.role}</span></td>
      <td>${r.part.name}</td>
      <td style="font-family:'DM Mono',monospace">${r.att.inTime||'-'}</td>
      <td style="font-family:'DM Mono',monospace">${r.att.outTime||'-'}</td>
      <td>${r.att.manual?'<span class="sbadge" style="background:#fef3c7;color:#92400e">수동</span>':'<span style="color:var(--text-muted);font-size:11px">패드</span>'}</td>
    </tr>`;
  }).join('');
  document.getElementById('records-body').innerHTML=`<table class="acct-table"><thead><tr><th>날짜</th><th>직무</th><th>이름</th><th>출근</th><th>퇴근</th><th>입력방식</th></tr></thead><tbody>${tableRows}</tbody></table>`;
}
window.loadRecords=loadRecords;

function exportCSV() {
  if(!acctData.length){ showToast('먼저 조회해주세요'); return; }
  const header='날짜,직무,이름,스케줄,출근,퇴근,스케줄시수,최종시수,처리구분,메모,처리자';
  const rows=acctData.map(r=>[
    r.date, r.part.role, r.part.name,
    `${r.part.start}~${r.part.end}`,
    r.att.inTime||'', r.att.outTime||'',
    r.schedH, r.finalH,
    r.att.stdPhrase||'', r.att.memoText||'', r.att.memoBy||''
  ].map(v=>`"${v}"`).join(',')).join('\n');
  const blob=new Blob(['\uFEFF'+header+'\n'+rows],{type:'text/csv;charset=utf-8;'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a'); a.href=url;
  a.download=`강안교육_시수_${document.getElementById('acct-from').value}_${document.getElementById('acct-to').value}.csv`;
  a.click(); URL.revokeObjectURL(url);
}

      <td style="font-family:'DM Mono',monospace;font-weight:700;letter-spacing:4px">${p.pin||'-'}</td>
      <td>${(p.days||[]).join('·')}</td>
      <td style="font-family:'DM Mono',monospace">${p.start||'-'}~${p.end||'-'}</td>
      <td><span class="sbadge ${active?'s-active':'s-inactive'}">${active?'재직':'퇴사'}</span></td>
      <td>
        <button class="icon-btn" onclick="openEditPartModal('${p.id}')">수정</button>
        <button class="icon-btn" onclick="openPinModal('${p.id}')">PIN</button>
        ${active?`<button class="icon-btn" style="color:var(--danger)" onclick="resignPart('${p.id}')">퇴사</button>`:`<button class="icon-btn" style="color:var(--success)" onclick="reinstatePart('${p.id}')">재입사</button>`}
      </td></tr>`;
  }).join('');
  document.getElementById('parts-table-wrap').innerHTML=`<div style="overflow-x:auto"><table class="parts-table"><thead><tr><th>직무</th><th>이름</th><th>휴대폰</th><th>PIN</th><th>요일</th><th>시간</th><th>상태</th><th>관리</th></tr></thead><tbody>${rows}</tbody></table></div>`;
}

function openAddPartModal(){document.getElementById('modal-part-title').textContent='파트 등록';renderPartForm(null);openModal('modal-part');}
function openEditPartModal(id){document.getElementById('modal-part-title').textContent='파트 수정';renderPartForm(id);openModal('modal-part');}
window.openAddPartModal=openAddPartModal; window.openEditPartModal=openEditPartModal;

function renderPartForm(partId) {
  const p=partId?allParts[partId]:null;
  const days=['월','화','수','목','금','토','일'];
  const selDays=p?.days||[];
  const catOpts=['mgmt','tutor','etc'].map(c=>`<option value="${c}" ${p?.cat===c?'selected':''}>${CAT_META[c].label}</option>`).join('');
  document.getElementById('modal-part-body').innerHTML=`
    <div class="form-group"><label class="form-label">대카테고리</label><select class="form-select" id="pf-cat">${catOpts}</select></div>
    <div class="form-group"><label class="form-label">직무명</label><input class="form-input" id="pf-role" placeholder="예: 순찰, 수학, 디자인" value="${p?.role||''}"></div>
    <div class="form-group"><label class="form-label">이름</label><input class="form-input" id="pf-name" placeholder="홍길동" value="${p?.name||''}"></div>
    <div class="form-group"><label class="form-label">휴대폰</label><input class="form-input" id="pf-phone" placeholder="010-0000-0000" value="${p?.phone||''}"></div>
    <div class="form-group"><label class="form-label">출결 PIN (4자리 — 미입력 시 뒷번호 4자리 자동)</label><input class="form-input" id="pf-pin" placeholder="0000" maxlength="4" value="${p?.pin||''}"></div>
    <div class="form-group"><label class="form-label">근무 요일</label><div class="day-btns" id="pf-days">${days.map(d=>`<button type="button" class="day-btn${selDays.includes(d)?' selected':''}" onclick="toggleDay('${d}')">${d}</button>`).join('')}</div></div>
    <div style="display:flex;gap:10px">
      <div class="form-group" style="flex:1"><label class="form-label">출근 시간</label><input class="form-input" id="pf-start" type="time" value="${p?.start||'09:00'}"></div>
      <div class="form-group" style="flex:1"><label class="form-label">퇴근 시간</label><input class="form-input" id="pf-end" type="time" value="${p?.end||'18:00'}"></div>
    </div>
    <div class="btn-row"><button class="btn-secondary" onclick="closeModal('modal-part')">취소</button><button class="btn-primary" onclick="savePartForm('${partId||''}')">저장</button></div>`;
}
function toggleDay(d){document.querySelectorAll('#pf-days .day-btn').forEach(b=>{if(b.textContent===d)b.classList.toggle('selected');});}
window.toggleDay=toggleDay;

async function savePartForm(partId) {
  const role=document.getElementById('pf-role').value.trim();
  const name=document.getElementById('pf-name').value.trim();
  const phone=document.getElementById('pf-phone').value.trim();
  const start=document.getElementById('pf-start').value;
  const end=document.getElementById('pf-end').value;
  const cat=document.getElementById('pf-cat').value;
  const days=[...document.querySelectorAll('#pf-days .day-btn.selected')].map(b=>b.textContent);
  if(!role||!name){showToast('직무와 이름은 필수입니다');return;}
  if(!days.length){showToast('근무 요일을 선택해주세요');return;}
  let pin=document.getElementById('pf-pin').value.trim();
  if(!pin&&phone.length>=4) pin=phone.replace(/-/g,'').slice(-4);
  if(!/^\d{4}$/.test(pin)){showToast('PIN은 4자리 숫자여야 합니다');return;}
  const dup=Object.entries(allParts).find(([id,p])=>p.pin===pin&&id!==partId);
  if(dup){showToast(`PIN ${pin}은 이미 사용 중입니다`);return;}
  const data={cat,role,name,phone,pin,start,end,days,active:true,memos:partId?(allParts[partId].memos||[]):[]};
  showLoading(true);
  if(partId) await update(ref(db,`parts/${partId}`),data);
  else await push(ref(db,'parts'),data);
  showLoading(false); showToast(partId?'수정 완료':'등록 완료'); closeModal('modal-part');
}
window.savePartForm=savePartForm;

// ── PIN ──
function openPinModal(partId) {
  const p=allParts[partId];
  document.getElementById('modal-pin-body').innerHTML=`
    <div class="modal-row"><span class="modal-key">현재 PIN</span><span class="modal-val" style="font-family:'DM Mono',monospace;font-size:22px;letter-spacing:6px">${p.pin||'-'}</span></div>
    <div class="form-group" style="margin-top:14px"><label class="form-label">새 PIN (4자리 숫자)</label>
    <input class="form-input" id="new-pin" maxlength="4" placeholder="0000" style="font-size:22px;text-align:center;letter-spacing:10px;font-family:'DM Mono',monospace"></div>
    <div class="btn-row"><button class="btn-secondary" onclick="closeModal('modal-pin')">취소</button><button class="btn-primary" onclick="savePinChange('${partId}')">변경</button></div>`;
  openModal('modal-pin');
}
window.openPinModal=openPinModal;

async function savePinChange(partId) {
  const newPin=document.getElementById('new-pin').value.trim();
  if(!/^\d{4}$/.test(newPin)){showToast('4자리 숫자를 입력해주세요');return;}
  const dup=Object.entries(allParts).find(([id,p])=>p.pin===newPin&&id!==partId);
  if(dup){showToast(`PIN ${newPin}은 이미 사용 중입니다`);return;}
  showLoading(true);
  await update(ref(db,`parts/${partId}`),{pin:newPin});
  showLoading(false); showToast('PIN 변경 완료'); closeModal('modal-pin');
}
window.savePinChange=savePinChange;

// ── 퇴사/재입사 ──
async function resignPart(partId) {
  if(!confirm('퇴사 처리하시겠습니까? 이력은 보존됩니다.')) return;
  showLoading(true);
  await update(ref(db,`parts/${partId}`),{active:false,resignDate:todayStr()});
  showLoading(false); showToast('퇴사 처리 완료');
}
async function reinstatePart(partId) {
  if(!confirm('재입사 처리하시겠습니까?')) return;
  showLoading(true);
  await update(ref(db,`parts/${partId}`),{active:true,reinstateDate:todayStr()});
  showLoading(false); showToast('재입사 처리 완료');
}
window.resignPart=resignPart; window.reinstatePart=reinstatePart;

// ── 계정 관리 ──
function renderAccountList() {
  const initAcc=[{id:'admin',role:'관리자',name:'관리자(기본)'}];
  const all=[...initAcc,...allAccounts];
  document.getElementById('account-list').innerHTML=all.map(a=>`
    <div class="account-item">
      <div>
        <div style="font-size:13px;font-weight:600">${a.name} <span style="color:var(--text-muted);font-size:11px">(${a.id})</span></div>
        <div style="font-size:11px;color:var(--text-muted);margin-top:2px">${a.role}</div>
      </div>
      ${a.fbId?`<button class="icon-btn" style="color:var(--danger)" onclick="deleteAccount('${a.fbId}')">삭제</button>`:'<span style="font-size:11px;color:var(--text-muted)">기본</span>'}
    </div>`).join('');
}

function openAddAccountModal() {
  document.getElementById('modal-account-title').textContent='계정 추가';
  document.getElementById('modal-account-body').innerHTML=`
    <div class="form-group"><label class="form-label">이름</label><input class="form-input" id="acc-name" placeholder="홍길동"></div>
    <div class="form-group"><label class="form-label">아이디</label><input class="form-input" id="acc-id" placeholder="hong123"></div>
    <div class="form-group"><label class="form-label">비밀번호</label><input class="form-input" id="acc-pw" placeholder="비밀번호" type="password"></div>
    <div class="form-group"><label class="form-label">권한</label>
      <select class="form-select" id="acc-role">
        <option value="관리자">관리자</option>
        <option value="총무">총무</option>
        <option value="일반직원">일반직원</option>
      </select></div>
    <div class="btn-row"><button class="btn-secondary" onclick="closeModal('modal-account')">취소</button><button class="btn-primary" onclick="saveAccount()">추가</button></div>`;
  openModal('modal-account');
}
window.openAddAccountModal=openAddAccountModal;

async function saveAccount() {
  const name=document.getElementById('acc-name').value.trim();
  const id=document.getElementById('acc-id').value.trim();
  const pw=document.getElementById('acc-pw').value;
  const role=document.getElementById('acc-role').value;
  if(!name||!id||!pw){showToast('모든 항목을 입력해주세요');return;}
  // 중복 체크
  const snap=await get(ref(db,'accounts'));
  const existing=snap.val()?Object.values(snap.val()):[];
  if(existing.find(a=>a.id===id)||id==='admin'){showToast('이미 사용 중인 아이디입니다');return;}
  showLoading(true);
  await push(ref(db,'accounts'),{name,id,pw,role});
  await loadAccounts();
  showLoading(false); showToast('계정 추가 완료'); closeModal('modal-account');
}
window.saveAccount=saveAccount;

async function deleteAccount(fbId) {
  if(!confirm('계정을 삭제하시겠습니까?')) return;
  showLoading(true);
  await remove(ref(db,`accounts/${fbId}`));
  await loadAccounts();
  showLoading(false); showToast('삭제 완료');
}
window.deleteAccount=deleteAccount;

window.closeModal=closeModal; window.openModal=openModal;
</script>
</body>
</html>
